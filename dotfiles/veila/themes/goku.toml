# goku — dusk-desert vibe (veila 0.3.0)
# Palette sampled from wallpaper: warm peach accents, deep teal darks.

[background]
mode = "file"
path = "/home/maari/.config/veila/wallpaper/goku.jpg"
color = "#1a1414"
scaling = "fill"
blur_strength = 0
dim_strength = 0

[lock]
screen_off_seconds = 120
hide_cursor = true
power_off_secondary_outputs = true
allow_empty_password = true

[fingerprint]
enabled = true

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
enabled = true
format = "24h"
font_family = "Oswald"
font_weight = 700
color = "rgba(242, 165, 120, 0.95)"
font_size = 110
meridiem_font_size = 16
meridiem_x = 6
meridiem_y = 7
halign = "center"
valign = "top"
x = 0
y = 60

[visuals.date]
enabled = true
format = "short"
font_family = "DejaVu Serif"
font_weight = 400
color = "rgba(234, 157, 119, 0.70)"
font_size = 28
halign = "center"
valign = "top"
x = 0
y = 180

[visuals.input]
