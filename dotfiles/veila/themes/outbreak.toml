# outbreak — hazard-sign / barbed-wire vibe
# Palette sampled from wallpaper: pale slate, dark navy, blood-red accents.

[background]
mode = "file"
path = "/home/maari/.config/veila/wallpaper/outbreak-wallpaper-2880x1800.jpg"
color = "#0a0a10"
scaling = "fill"
blur_radius = 3
dim_strength = 12

[lock]
user_hint = "maari"
show_username = false
avatar_path = "/home/maari/.face.jpg"

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
alignment = "top-left"
format = "24h"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Stardos Stencil"
font_weight = 700
color = "rgba(122, 46, 57, 0.95)"
size = 22
gap = 16

[visuals.date]
font_family = "Stardos Stencil"
font_weight = 700
color = "rgba(213, 225, 232, 0.70)"
size = 5

[visuals.input]
