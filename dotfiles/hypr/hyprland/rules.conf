# https://wiki.hyprland.org/Configuring/
### WINDOWS AND WORKSPACES ###

windowrule = match:class foot|equibop|org\.quickshell|imv|swappy, opaque on  # They use native transparency or we want them opaque
windowrule = match:float true, match:xwayland false, center on  # Center all floating windows (not xwayland cause popups)

windowrule = match:title 1Password, float on
windowrule = match:title 1Password, center on

windowrule = match:class firefox, match:title (Page Info - .*), float on
windowrule = match:class firefox, match:title (Page Info - .*), size 60% 70%

windowrule = match:title MainPicker, float on
windowrule = match:class (VirtualBox .*), float on
windowrule = match:class google-chrome, match:title (Meet - .*), float on

windowrule = match:class .*, suppress_event maximize # You'll probably like this.

windowrule = match:class firefox, match:title Picture-in-Picture, float on
windowrule = match:class firefox, match:title Library, float on
windowrule = match:class vlc, float on
windowrule = match:class qt5ct, float on
windowrule = match:class qt6ct, float on
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class nm-applet, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:class org.kde.dolphin, match:title (Progress Dialog — Dolphin), float on
windowrule = match:class org.kde.dolphin, match:title (Copying — Dolphin), float on
windowrule = match:class org.kde.polkit-kde-authentication-agent-1, float on
windowrule = match:class Safeeyes, float on

windowrule = match:class imv, float on # Imageviewer

windowrule = match:class xdg-desktop-portal-gtk, match:title (All Files), float on
windowrule = match:class org.quickshell, match:title (Select a profile picture), float on
windowrule = match:class spotify, float on

# Screen sharing windows by browsers
windowrule = match:title (Select what to share), float on
windowrule = match:title (Select what to share), center on

# for nasty Vivaldi custom fallback notifications
windowrule = match:class ^$, match:title ^$, float on

# Special workspaces
windowrule = match:class btop, workspace special:sysmon
windowrule = match:class feishin|Spotify|Supersonic, workspace special:music
windowrule = match:initial_title (Spotify( Free)?), workspace special:music  # Spotify wayland, it has no class for some reason
windowrule = match:class discord|equibop|vesktop|whatsapp, workspace special:communication
windowrule = match:class Todoist, workspace special:todo

# Dialogs
windowrule = match:title ((Select|Open)( a)? (File|Folder)(s)?), float on
windowrule = match:title (File (Operation|Upload)( Progress)?), float on
windowrule = match:title (.* Properties), float on
windowrule = match:title (Export Image as PNG), float on
windowrule = match:title (GIMP Crash Debug), float on
windowrule = match:title (Save As), float on
windowrule = match:title Library, float on

# Picture in picture (resize and move done via script)
windowrule = match:title (Picture(-| )in(-| )[Pp]icture), move 100%-w-2% 100%-w-3%  # Initial move so window doesn't shoot across the screen from the center
windowrule = match:title (Picture(-| )in(-| )[Pp]icture), keep_aspect_ratio on
windowrule = match:title (Picture(-| )in(-| )[Pp]icture), float on
windowrule = match:title (Picture(-| )in(-| )[Pp]icture), pin on

# Ugh xwayland popups
windowrule = match:xwayland true, match:title win[0-9]+, no_dim on
windowrule = match:xwayland true, match:title win[0-9]+, no_shadow on
windowrule = match:xwayland true, match:title win[0-9]+, rounding 10


# █   ▄▀█ █▄█ █▀▀ █▀█   █▀█ █ █ █   █▀▀ █▀
# █▄▄ █▀█  █  ██▄ █▀▄   █▀▄ █▄█ █▄▄ ██▄ ▄█

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace org.wezfurlong.wezterm
layerrule = blur on, match:namespace wezterm

# ######## Layer rules ########
layerrule = animation fade, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace logout_dialog  # wlogout
layerrule = animation fade, match:namespace selection  # slurp
layerrule = animation fade, match:namespace wayfreeze

# Shell
layerrule = animation none, match:namespace caelestia-(border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)

layerrule = blur on, match:namespace caelestia-drawers
layerrule = ignore_alpha 0.57, match:namespace caelestia-drawers
