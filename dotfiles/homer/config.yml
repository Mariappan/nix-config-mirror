# Homer dashboard
#
# Smart cards (type: …) fetch from the browser cross-origin, so each pinged
# vhost sets Access-Control-Allow-Origin for this dashboard's origin.
# NOTE: `type:` is case-sensitive (Homer loads components by filename) —
#   `UptimeKuma`, `Ping`, etc. The UptimeKuma card needs a PUBLIC status page (slug below).

title: "earth"
subtitle: "Homelab"
logo: "logo.png"
header: true
footer: false

theme: default
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    background: "#f5f5f5"
    card-background: "#ffffff"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    background: "#131313"
    card-background: "#2b2b2b"

services:
  - name: "Status"
    icon: "fas fa-heart-pulse"
    items:
      - name: "Uptime Kuma"
        subtitle: "Service status"
        type: "UptimeKuma"
        url: "https://uptime.lab.nappairam.dev"
        slug: "default"
        target: "_blank"
      - name: "Paperless"
        subtitle: "Documents"
        type: "Ping"
        url: "https://paperless.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"

  - name: "Media"
    icon: "fas fa-photo-film"
    items:
      - name: "Plex"
        subtitle: "Media server"
        type: "Ping"
        url: "https://plex.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"

  # Keep this group LAST
  - name: "Downloads (*arr)"
    icon: "fas fa-download"
    items:
      - name: "qBittorrent"
        type: "Ping"
        url: "https://qbit.arr.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401, 403]
        target: "_blank"
      - name: "Prowlarr"
        type: "Ping"
        url: "https://prowl.arr.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"
      - name: "Sonarr"
        type: "Ping"
        url: "https://son.arr.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"
      - name: "Radarr"
        type: "Ping"
        url: "https://rad.arr.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"
      - name: "Bazarr"
        type: "Ping"
        url: "https://baz.arr.lab.nappairam.dev"
        method: "GET"
        successCodes: [200, 301, 302, 401]
        target: "_blank"
