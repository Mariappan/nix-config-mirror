[backdrop]
enabled = true

[bar.default]
background_opacity = 0.85
radius = 0
capsule = true
capsule_opacity = 0.5
capsule_padding = 8.0
center = [ "clock" ]
end = [ "group:g1", "clipboard", "notifications", "tray" ]
font_family = "Script12 BT"
font_weight = 400
margin_edge = 0
margin_ends = 0
padding = 8
position = "left"
start = [ "screenshot", "battery", "sysmon", "workspaces", "lock_keys" ]
thickness = 40


[[bar.default.capsule_group]]
id = "g1"
members = [ "network", "bluetooth", "volume", "input_volume" ]
fill = "surface_variant"
opacity = 0.5
padding = 8.0

[desktop_widgets]
enabled = false

[keybinds]
cancel = [ "Escape" ]

[location]
address = "Singapore"

[lockscreen]
enabled = false

[notification]
layer = "overlay"

[osd]
position = "bottom_center"

[shell]
avatar_path = "/home/maari/.face.jpg"
font_family = "Liberation Sans"
launch_apps_as_systemd_services = true
niri_overview_type_to_launch_enabled = true
polkit_agent = false
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.launcher]
    app_grid = true
    categories = false
    session_search = true

    [shell.panel]
    control_center_placement = "centered"
    session_placement = "floating"
    session_position = "center"
    transparency_mode = "glass"
    wallpaper_placement = "floating"
    wallpaper_position = "center"

    [shell.screen_corners]
    enabled = true
    size = 16

    [shell.screenshot]
    directory = "/home/maari/pictures/Screenshots"

    [[shell.session.actions]]
    action = "lock"
    command = "veila lock"
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = true
    label = "Suspend"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    variant = "destructive"

    [shell.shadow]
    direction = "right"

[system.monitor]
disk_poll_seconds = 120

[theme]
builtin = "Kanagawa"
mode = "dark"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "/home/maari/pictures/Wallpapers"
transition = [ "disc", "fade", "zoom" ]

    [wallpaper.automation]
    enabled = true
    interval_seconds = 43200
    recursive = false

[weather]
refresh_minutes = 240

[widget.battery]
display_mode = "graphic"
show_label = true

[widget.bluetooth]
capsule = false

[widget.clock]
capsule = false
color = "primary"
font_weight = 700
vertical_format = "{:%I\\n%M}\\n--\\n{:%b\\n%d}\\n--\\n{:%a}"
tooltip_format = "{:%I:%M %p} {:%b %d} {:%a}"

[widget.input_volume]
capsule = false
show_label = false

[widget.lock_keys]
hide_when_off = true

[widget.network]
show_label = false
capsule = false

[widget.ram]
display = "text"
show_label = false
stat = "cpu_usage"

[widget.screenshot]
glyph = "noctalia"

[widget.sysmon]
display = "gauge"
show_label = false
stat = "cpu_usage"

[widget.tray]
drawer = true
pinned = [ "expressvpn" ]

[widget.volume]
capsule = false
show_label = false

[widget.workspaces]
display = "none"
empty_color = "on_surface"
